              "반응속도는 반복 연습으로 어느 정도까지는 향상되지만, 개인차와 생물학적 한계가 분명히 존재합니다. 무리하게 기록에 집착하기보다 꾸준히 가볍게 즐기며 자신의 평소 컨디션을 확인하는 도구로 활용해 보세요."

          }
        ]
      },

      en: {
        htmlLang: "en",
        stageAria: "Start reaction test",

        stage: {

          waitTitle: "Wait...",
          waitHint: function (n, total) { return "Tap the moment it turns green! (" + n + " / " + total + ")"; },
          goTitle: "GO!",
          goHint: "Tap!",
          earlyTitle: "Too soon!",
          earlyHint: "You tapped before it turned green. This round doesn't count. Tap to try again.",
          nextHint: "Nice! Tap to go to the next round.",
          lastHint: "Last round! Tap to see your result.",
          doneTitle: "Done!",
          doneHint: "Check your result below."
        },
        tiers: [
          { name: "Cheetah", desc: "Lightning-fast reflexes!" },
          { name: "Rabbit", desc: "Seriously quick." },
          { name: "Horse", desc: "Above average — nice." },
          { name: "Turtle", desc: "Right around average." },
          { name: "Sloth", desc: "Taking it easy." }
        ],
        tierSuffix: " tier",
        percentile: function (desc, pct) {
          return desc + " Roughly <strong>top " + pct + "%</strong> vs. the 250ms human average.";
        },
        attempt: function (i, ms) { return "#" + i + " · " + ms + "ms"; },
        copyBtn: "📋 Copy result",
        copiedBtn: "✅ Copied!",
        retryBtn: "🔄 Play again",
        copyText: function (avg, tierName, url) {
          return "My reaction time: " + avg + "ms, " + tierName + " tier! Try it: " + url;
        },
        toastCopied: "Copied to clipboard!",
        toastFail: "Couldn't copy. Please copy manually.",
        info: [
          {
            h: "What is reaction time?",
            ps: [
              "Reaction time is how long it takes your body to respond from the moment you notice a stimulus. In this test, you watch for the screen turning green, and we measure the time until your finger taps the screen, down to the millisecond (ms).",

            ]
          },
          {
            h: "What's the average reaction time?",
            ps: [
              "The average human reaction time to a visual cue is roughly 200–250ms. This test uses 250ms as the human average to estimate your percentile. Keep in mind this is a fun estimate, not a precise medical measurement.",
              "Your result can swing by tens of milliseconds depending on your device, screen refresh rate, touch latency, and how you're feeling that day. Even the same person gets different numbers each time, so an average over several tries is more meaningful than a single result."
            ]
          },
          {
            h: "How to improve your reaction time",
            ps: [
              "Enough sleep and rest make a real difference. When you're tired, your brain processes information more slowly and your reactions noticeably dull. Just warming up a little and getting focused before you test can nudge your results in the right direction.",
              "Keep your eyes on the screen and anticipate where the green will appear to shave off decision time. But pressing early — before it turns green — is counted as a foul, so practice reacting to the real signal rather than guessing.",

            ]
          }

    };

    var LANG_ORDER = ["ko", "en"];

    // ===== 언어 상태 =====
    var currentLang = detectLang();

    function detectLang() {
      var saved = null;
      try { saved = sessionStorage.getItem("rt_lang"); } catch (e) {}
      if (saved && I18N[saved]) return saved;
      var nav = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      return nav.indexOf("ko") === 0 ? "ko" : "en";
    }
    function t() { return I18N[currentLang]; }

    // ===== 게임 상태 =====
    var state = "idle"; // idle | waiting | go | result-inter | early | result
    var stageView = "idle"; // 언어 전환 시 다시 그릴 안정 화면: "idle" | "done" | "playing"
    var retryFlag = false;
    var round = 0;
    var results = [];
    var goTime = 0;
    var timer = null;
    var best = null;
    var lastResult = null; // { avg, tierIndex, pct }

    // ===== DOM =====
    var langSwitch = document.getElementById("langSwitch");
    var subtitleEl = document.getElementById("subtitle");
    var bestBadge = document.getElementById("bestBadge");
    var bestLabel = document.getElementById("bestLabel");
    var bestValue = document.getElementById("bestValue");
    var stage = document.getElementById("stage");
    var stageEmoji = document.getElementById("stageEmoji");
    var stageTitle = document.getElementById("stageTitle");
    var stageHint = document.getElementById("stageHint");
    var dotsEl = document.getElementById("dots");
    var resultCard = document.getElementById("resultCard");
    var tierEmoji = document.getElementById("tierEmoji");
    var tierName = document.getElementById("tierName");
    var avgValue = document.getElementById("avgValue");
    var percentile = document.getElementById("percentile");
    var attemptsList = document.getElementById("attemptsList");
    var copyBtn = document.getElementById("copyBtn");
    var retryBtn = document.getElementById("retryBtn");
    var infoSections = document.getElementById("infoSections");
    var toast = document.getElementById("toast");

    // ===== 진행 점 =====
    function buildDots() {
      dotsEl.innerHTML = "";
      for (var i = 0; i < TOTAL_ROUNDS; i++) {
        var d = document.createElement("span");
        d.className = "dot";
        dotsEl.appendChild(d);
      }
    }
    function refreshDots() {
      var nodes = dotsEl.children;
      for (var i = 0; i < nodes.length; i++) {
        nodes[i].className = "dot";
        if (i < results.length) nodes[i].classList.add("done");
        else if (i === results.length && state !== "result") nodes[i].classList.add("active");
      }
    }

    // ===== 화면 상태 =====
    function setStage(cls, emoji, title, hint) {
      stage.className = "stage " + cls;
      stageEmoji.textContent = emoji;
      stageTitle.textContent = title;
      stageHint.innerHTML = hint;
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(function () { toast.classList.remove("show"); }, 1800);
    }

    // ===== 게임 흐름 =====
    function renderIdle() {
      var s = t().stage;
      setStage("idle", "👆", retryFlag ? s.retryTitle : s.idleTitle, retryFlag ? s.retryHint : s.idleHint);
    }

    function startWaiting() {
      state = "waiting"; stageView = "playing";
      resultCard.classList.remove("show");
      var s = t().stage;
      setStage("waiting", "✋", s.waitTitle, s.waitHint(round + 1, TOTAL_ROUNDS));
      refreshDots();
      var delay = MIN_WAIT + Math.random() * (MAX_WAIT - MIN_WAIT);
      timer = setTimeout(function () {
        state = "go";
        goTime = Date.now();
        var sg = t().stage;
        setStage("go", "⚡", sg.goTitle, sg.goHint);
      }, delay);
    }

    function recordSuccess(ms) {
      results.push(ms);
      round++;
      if (best === null || ms < best) { best = ms; updateBest(); }
      state = "result-inter"; stageView = "playing";
      var s = t().stage;
      setStage("result", "", "",
        results.length < TOTAL_ROUNDS ? s.nextHint : s.lastHint);
      stageTitle.innerHTML = '<span class="rt-value">' + ms + '<small> ms</small></span>';
      stageEmoji.textContent = ms < 200 ? "🔥" : ms < 280 ? "👍" : "🙂";
      refreshDots();
    }

    function handleEarly() {
      clearTimeout(timer);
      state = "early"; stageView = "playing";
      var s = t().stage;
      setStage("early", "🚫", s.earlyTitle, s.earlyHint);
      var nodes = dotsEl.children;
      if (nodes[results.length]) nodes[results.length].className = "dot void";
    }

    function pickTierIndex(avg) {
      for (var i = 0; i < TIERS.length; i++) {
        if (avg <= TIERS[i].max) return i;
      }
      return TIERS.length - 1;
    }

    function finish() {
      state = "result"; stageView = "done";
      var sum = results.reduce(function (a, b) { return a + b; }, 0);
      var avg = Math.round(sum / results.length);
      var idx = pickTierIndex(avg);
      var pct = estimatePercentile(avg);
      lastResult = { avg: avg, tierIndex: idx, pct: pct };

      renderResultCard();
      var s = t().stage;
      setStage("idle", "🎉", s.doneTitle, s.doneHint);
      resultCard.classList.add("show");
      refreshDots();
      resultCard.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    // 결과 카드를 현재 언어로 렌더링 (언어 전환 시 재사용)
    function renderResultCard() {
      if (!lastResult) return;
      var L = t();
      var tierData = L.tiers[lastResult.tierIndex];
      tierEmoji.textContent = TIERS[lastResult.tierIndex].emoji;
      tierName.textContent = tierData.name + L.tierSuffix;
      avgValue.textContent = lastResult.avg;
      percentile.innerHTML = L.percentile(tierData.desc, lastResult.pct);

      attemptsList.innerHTML = "";
      results.forEach(function (ms, i) {
        var chip = document.createElement("span");
        chip.className = "attempt-chip";
        chip.textContent = L.attempt(i + 1, ms);
        attemptsList.appendChild(chip);
      });

      // 복사용 데이터
      resultCard.dataset.avg = lastResult.avg;
      resultCard.dataset.tier = tierData.name;
    }

    // 상위 백분율 추정 (250ms=평균 50%, 표준편차 약 45ms 정규분포 가정)
    function estimatePercentile(avg) {
      var sd = 45;
      var z = (avg - HUMAN_AVG) / sd;
      var top = Math.round(normalCdf(z) * 100);
      if (top < 1) top = 1;
      if (top > 99) top = 99;
      return top;
    }
    function normalCdf(z) {
      var t = 1 / (1 + 0.2316419 * Math.abs(z));
      var d = 0.3989423 * Math.exp(-z * z / 2);
      var prob = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
      return z > 0 ? 1 - prob : prob;
    }

    function updateBest() {
      bestBadge.hidden = false;
      bestValue.textContent = best + " ms";
    }

    // ===== 입력 처리 =====
    function onStageInput(e) {
      if (e) e.preventDefault();
      switch (state) {
        case "idle":
          round = 0; results = []; buildDots();
          startWaiting();
          break;
        case "waiting":
          handleEarly();
          break;
        case "go":
          recordSuccess(Date.now() - goTime);
          break;
        case "result-inter":
          if (results.length >= TOTAL_ROUNDS) finish();
          else startWaiting();
          break;
        case "early":
          startWaiting();
          break;
      }
    }

    stage.addEventListener("touchstart", function (e) { onStageInput(e); }, { passive: false });
    stage.addEventListener("click", function (e) {
      if (e.detail === 0) return; // 키보드는 keydown에서
      onStageInput(e);
    });
    stage.addEventListener("keydown", function (e) {
      if (e.key === " " || e.key === "Enter") { onStageInput(e); }
    });
    var lastTouch = 0;
    stage.addEventListener("touchend", function () { lastTouch = Date.now(); });
    stage.addEventListener("click", function (e) {
      if (Date.now() - lastTouch < 600) { e.stopImmediatePropagation(); }
    }, true);

    // ===== 버튼 =====
    retryBtn.addEventListener("click", function () {
      resultCard.classList.remove("show");
      state = "idle"; stageView = "idle"; retryFlag = true;
      round = 0; results = []; lastResult = null;
      buildDots();
      renderIdle();
      stage.scrollIntoView({ behavior: "smooth", block: "center" });
    });

    copyBtn.addEventListener("click", function () {
      var avg = resultCard.dataset.avg;
      var tier = resultCard.dataset.tier;
      var siteUrl = location.href.split(/[?#]/)[0];
      var text = t().copyText(avg, tier, siteUrl);
      copyText(text).then(function () {
        copyBtn.classList.add("copied");
        copyBtn.textContent = t().copiedBtn;
        showToast(t().toastCopied);
        setTimeout(function () {
          copyBtn.classList.remove("copied");
          copyBtn.textContent = t().copyBtn;
        }, 1600);
      }).catch(function () {
        showToast(t().toastFail);
      });
    });

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise(function (resolve, reject) {
        try {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          var ok = document.execCommand("copy");
          document.body.removeChild(ta);
          ok ? resolve() : reject();
        } catch (err) { reject(err); }
      });
    }

    // ===== 설명 섹션 렌더링 =====
    function renderInfo() {
      infoSections.innerHTML = "";
      t().info.forEach(function (sec) {
        var section = document.createElement("section");
        var h = document.createElement("h2");
        h.textContent = sec.h;
        section.appendChild(h);
        sec.ps.forEach(function (p) {
          var el = document.createElement("p");
          el.textContent = p;
          section.appendChild(el);
        });
        infoSections.appendChild(section);
      });
    }

    // ===== 언어 적용 =====
    function applyLang(lang) {
      if (!I18N[lang]) return;
      currentLang = lang;
      try { sessionStorage.setItem("rt_lang", lang); } catch (e) {}
      var L = I18N[lang];

      document.documentElement.lang = L.htmlLang;
      stage.setAttribute("aria-label", L.stageAria);
      subtitleEl.textContent = L.subtitle;
      bestLabel.textContent = L.bestLabel;
      copyBtn.textContent = L.copyBtn;
      retryBtn.textContent = L.retryBtn;

      // 언어 버튼 활성 표시
      var btns = langSwitch.querySelectorAll("button");
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle("active", btns[i].getAttribute("data-lang") === lang);
      }

      renderInfo();

      // 안정 화면(대기/게임 중이 아닐 때)만 다시 그림
      if (stageView === "idle") renderIdle();
      else if (stageView === "done") {
        setStage("idle", "🎉", L.stage.doneTitle, L.stage.doneHint);
      }
      if (resultCard.classList.contains("show")) renderResultCard();
    }

    langSwitch.addEventListener("click", function (e) {
      var btn = e.target.closest("button");
      if (!btn) return;
      applyLang(btn.getAttribute("data-lang"));
    });

    // ===== 초기화 =====
    buildDots();
    applyLang(currentLang); // 감지된 언어로 전체 UI 세팅 (idle 화면 포함)
  })();
  </script>
</body>
</html>
